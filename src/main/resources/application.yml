server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: xypt
  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/xypt_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowMultiQueries=true
    username: root
    password: 123456
  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 20MB
  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8       # 最大连接数
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
  # JSON序列化配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:mapper/**/*.xml

# 文件上传根路径（项目根目录下的upload文件夹）
upload:
  path: C:/Users/14504/Desktop/xypt_pro/upload/
  # 文件访问前缀
  url-prefix: http://localhost:8080/upload/

# 日志配置
logging:
  level:
    com.xypt: debug
    com.baomidou.mybatisplus: info
